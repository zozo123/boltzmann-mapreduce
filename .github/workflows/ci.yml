name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q
      - run: uv run python -m compileall -q bmr scripts demo.py

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      - name: Build paper
        working-directory: paper
        run: |
          mkdir -p /tmp/bmr-empty-texmf
          export TEXMFHOME=/tmp/bmr-empty-texmf
          pdflatex -interaction=nonstopmode -halt-on-error main_5pp.tex
          bibtex main_5pp
          pdflatex -interaction=nonstopmode -halt-on-error main_5pp.tex
          pdflatex -interaction=nonstopmode -halt-on-error main_5pp.tex
          ! grep -Eq "Overfull|Citation .* undefined|undefined references" main_5pp.log
      - uses: actions/upload-artifact@v4
        with:
          name: revised-paper
          path: paper/main_5pp.pdf
