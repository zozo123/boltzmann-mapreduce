name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run --locked python scripts/verify_e2e.py --skip-paper

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      - run: uv sync --locked
      - name: Verify complete release
        run: uv run --locked python scripts/verify_e2e.py
      - name: Verify locked provider SDK extras
        run: >-
          uv run --locked --extra daytona --extra tensorlake python -c
          "import scripts.daytona_fanout, scripts.tensorlake_fanout"
      - uses: actions/upload-artifact@v4
        with:
          name: revised-paper
          path: output/pdf/evidence-aware-reduction.pdf
